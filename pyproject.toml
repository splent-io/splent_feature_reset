[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_reset"
version = "1.3.2"
requires-python = ">=3.13"
authors = [{ name = "DiversoLab", email = "diversolab@us.es" }]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.tests", "*.tests.*"]

# ── Feature Contract (auto-generated) ────────────────────────────────────────
# Do not edit manually — re-run `splent feature:contract --write` to refresh.
[tool.splent.contract]
description = "Password reset feature: forgot password and token-based reset flow"

[tool.splent.contract.provides]
routes     = ["/reset/forgot", "/reset/password/<token>"]
blueprints = ["reset_bp"]
models     = ["ResetToken"]
commands   = []
hooks      = ["auth.login.form_footer", "auth.signup.form_footer", "layout.scripts"]
services   = ["ResetService"]
signals    = []
translations = []
docker     = []

[tool.splent.contract.requires]
features = ["auth"]
env_vars = []
signals  = []

[tool.splent.contract.extensible]
services  = ["ResetService"]
templates = []
models    = ["ResetToken"]
hooks     = ["auth.login.form_footer", "auth.signup.form_footer"]
routes    = true
